spring.application.name=HubFlow
server.port=8080
jwt.secret = ${JWT_SECRET}
jwt.access-token-expiry-ms = ${JWT_ACCESS_TOKEN_EXPIRY_MS}
jwt.refresh-token-expiry-ms =${JWT_REFRESH_TOKEN_EXPIRY_MS}
server.servlet.context-path=/hub-flow/api/v1

spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=ru.berkut.spring.hubflow.web.controller

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Admin initializer
app.admin.email=${ADMIN_EMAIL:admin@hubflow.com}
app.admin.password=${ADMIN_PASSWORD:changeme}
app.admin.first-name=${ADMIN_FIRST_NAME:Admin}
app.admin.last-name=${ADMIN_LAST_NAME:HubFlow}

app.base-url=${APP_BASE_URL:http://localhost:8080}